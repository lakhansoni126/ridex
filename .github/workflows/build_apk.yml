name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Android Project
        run: flutter create --platforms android .

      - name: Inject Android Permissions
        run: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          perms = '''
              <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
              <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />
              <uses-permission android:name=\"android.permission.ACCESS_BACKGROUND_LOCATION\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_LOCATION\" />
              <uses-permission android:name=\"android.permission.WAKE_LOCK\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.SEND_SMS\" />
              <uses-permission android:name=\"android.permission.INTERNET\" />
          '''
          content = content.replace('<application', perms + '\n    <application')
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Fix Isar Plugin Namespace Issue
        run: |
          cat <<EOF >> android/build.gradle
          
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group
                          }
                          compileSdkVersion 36
                      }
                  }
              }
          }
          EOF

      - name: Generate Code (Isar & Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ridex-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
